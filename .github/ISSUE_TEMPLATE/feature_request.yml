name: Feature Request
description: Suggest a new feature for IntlParty
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like to see.

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: What problem does this feature solve? Why do you need it?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: How should this feature work? Include API examples if possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other solutions have you considered or tried?

  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package would this feature belong to?
      options:
        - "@intl-party/core"
        - "@intl-party/react"
        - "@intl-party/nextjs"
        - "@intl-party/cli"
        - "@intl-party/eslint-plugin"
        - "New package"
        - "Not sure"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, mockups, or references.
